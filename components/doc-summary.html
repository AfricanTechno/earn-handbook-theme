<section class="eh-doc-summary" data-doc-summary>
  <div class="eh-doc-summary-head">
    <p class="eh-doc-kicker">Handbook entry</p>
    <h1 class="eh-doc-title" data-doc-title>{{PAGE_TITLE}}</h1>
    <p class="eh-doc-purpose" data-doc-purpose>{{PURPOSE_SUMMARY}}</p>
  </div>

  <dl class="eh-meta-grid">
    <div class="eh-meta-card">
      <dt>Authority owner</dt>
      <dd data-doc-owner>{{AUTHORITY_OWNER}}</dd>
    </div>
    <div class="eh-meta-card">
      <dt>Provider</dt>
      <dd data-doc-provider>{{PROVIDER}}</dd>
    </div>
    <div class="eh-meta-card">
      <dt>Applicable entities</dt>
      <dd data-doc-entities>{{APPLICABLE_ENTITIES}}</dd>
    </div>
  </dl>
</section>
