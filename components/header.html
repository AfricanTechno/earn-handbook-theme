<div class="eh-header-inner">
  <div class="eh-header-leading">
    <button
      type="button"
      class="eh-menu-btn"
      data-mobile-menu-toggle
      aria-controls="eh-sidebar"
      aria-expanded="false"
    >
      Menu
    </button>

    <div class="eh-brand">
      <p class="eh-brand-eyebrow">{{HANDBOOK_PARENT_LABEL}}</p>
      <a class="eh-brand-title" href="{{HANDBOOK_HOME_URL}}">{{HANDBOOK_NAME}}</a>
      <p class="eh-brand-subtitle">{{HANDBOOK_SUBTITLE}}</p>
    </div>
  </div>

  <form class="eh-search eh-header-panel" role="search" action="{{SEARCH_ACTION}}" method="get">
    <label for="eh-search-input">Search handbook</label>
    <div class="eh-search-row">
      <input
        id="eh-search-input"
        data-search-input
        type="search"
        name="q"
        placeholder="Search policies, controls, operations"
        autocomplete="off"
      />
      <button type="submit" aria-label="Search handbook">Search</button>
    </div>
  </form>

  <section class="eh-header-actions eh-header-panel" aria-label="Quick actions">
    <p class="eh-header-actions-label">Quick actions</p>
    <div class="eh-header-actions-list">
      <a class="eh-action-link" href="{{GROUP_HANDBOOK_URL}}">Open in Group Handbook</a>
      <a class="eh-action-link" href="{{LOGOUT_URL}}">Logout</a>
    </div>
  </section>
</div>
